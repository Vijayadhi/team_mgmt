name: Trigger Report Email

on:
  schedule:
    - cron: "30 18 * * *"   # 12:00 AM IST
  workflow_dispatch:

jobs:
  trigger-email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Check if Sunday
        id: daycheck
        run: |
          DAY=$(date +%u)   # 1=Mon ... 7=Sun
          echo "day=$DAY" >> "$GITHUB_OUTPUT"

      - name: Stop if Sunday
        if: steps.daycheck.outputs.day == '7'
        run: |
          echo "Today is Sunday. Skipping email."
          exit 0

      - name: Compute date range
        if: steps.daycheck.outputs.day != '7'
        id: dates
        run: |
          TO_DATE=$(date +%F)
          FROM_DATE=$(date -d "6 days ago" +%F)

          echo "to_date=$TO_DATE" >> "$GITHUB_OUTPUT"
          echo "from_date=$FROM_DATE" >> "$GITHUB_OUTPUT"

      - name: Call email endpoint
        if: steps.daycheck.outputs.day != '7'
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "from_date": "${{ steps.dates.outputs.from_date }}",
            "to_date": "${{ steps.dates.outputs.to_date }}",
            "send_emails": true,
            "lead_email": "ajinroch.a@iamneo.ai"
          }
          EOF
          )

          echo "$PAYLOAD"

          curl --fail --show-error --silent \
            -X POST "https://venerablevignesh-iamneo-team-mgmt.hf.space/api/external/missed-days/audit" \
            -H "Content-Type: application/json" \
            -H "X-Trigger-Token: Bearer ${{ secrets.TriggrerToken }}" \
            -d "$PAYLOAD"
