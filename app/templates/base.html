<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ request.state.app_title if request.state.app_title else (title or 'iamneo | Team Daily Tracker') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/styles.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white sticky-top">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="/">{{ request.state.app_title if request.state.app_title else 'iamneo | Team Daily Tracker' }}</a>
            {% if request.session.get('user_id') %}
            <form method="post" action="/logout" class="ms-auto">
                <button class="btn btn-outline-dark btn-sm" type="submit">Logout</button>
            </form>
            {% endif %}
        </div>
    </nav>
    <main class="py-4">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
